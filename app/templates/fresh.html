<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新鲜度判定参考样图库</title>
    <style>
        *{margin:0;padding:0;background:#f6fbf6;font-family:微软雅黑;}
        .wrap{width:90%;max-width:1300px;margin:30px auto;}
        h2{text-align:center;color:#297d3e;margin-bottom:30px;}
        .box{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-bottom:40px;}
        .card{background:#fff;padding:20px;border-radius:10px;border:1px solid #d7eed9;}
        h3{color:#297d3e;margin-bottom:12px;}
        p{line-height:1.7;color:#333;}
        .img-box{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:15px 0;}
        .img-box img{width:100%;border:1px solid #ddd;border-radius:6px;}
    </style>
</head>
<body>
<div class="wrap">
    <h2>🍌🍎水果新鲜度判定参考标准样图</h2>
    <div class="img-box">
        <div><p>新鲜苹果</p><img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rned3frr/3c29f999f37c4028990d32d3d2f09955~tplv-a9rned3frr-image.image"></div>
        <div><p>新鲜香蕉</p><img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rned3frr/8d3a2666f23448329966f3d78d469031~tplv-a9rned3frr-image.image"></div>
        <div><p>新鲜橙子</p><img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rned3frr/021622af2494432882d398380d8d1002~tplv-a9rned3frr-image.image"></div>
        <div><p>新鲜葡萄</p><img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rned3frr/189a2969f97843959882dd28f071d57e~tplv-a9rned3frr-image.image"></div>
        <div><p>四果混合实拍</p><img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rned3frr/31c81b81741b41149989d9d77d919178~tplv-a9rned3frr-image.image"></div>
        <div><p>腐坏劣变果样例</p><img src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rned3frr/99229f24347c4838998d79dd3f38396b~tplv-a9rned3frr-image.image"></div>
    </div>
    <div class="box">
        <div class="card">
            <h3>✅合格新鲜果（轻微小黑点/小瑕疵可食用）</h3>
            <p>1、香蕉：表皮少量零星小黑点、局部轻微发黄，无软烂、无大面积发黑腐坏 → 判定新鲜可食用</p>
            <p>2、苹果：表皮细微磕碰小斑点，果肉紧实不软烂 → 新鲜</p>
            <p>3、橙子：表皮少量干纹，无霉斑软烂 → 新鲜</p>
        </div>
        <div class="card">
            <h3>❌劣变不可食用果（大面积腐坏）</h3>
            <p>1、香蕉：超过1/3果皮发黑、果肉软烂流水 → 劣变禁食</p>
            <p>2、全果霉斑、果肉软烂出水 → 直接判定不新鲜</p>
            <p>备注：只有局部极细小瑕疵全部判定新鲜，不再轻易判坏果</p>
        </div>
    </div>
    <p style="text-align:center;"><a href="javascript:window.close()">关闭页面返回首页</a></p>
</div>
</body>
</html>
